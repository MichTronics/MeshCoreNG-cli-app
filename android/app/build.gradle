plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.meshcoreng.meshcli_ng"
    compileSdk = flutter.compileSdkVersion

    defaultConfig {
        applicationId = "com.meshcoreng.meshcli_ng"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            def storePath = System.getenv("RELEASE_STORE_PATH")
            storeFile     = storePath ? file(storePath) : null
            storePassword = System.getenv("RELEASE_STORE_PASSWORD") ?: ""
            keyAlias      = System.getenv("RELEASE_KEY_ALIAS")      ?: ""
            keyPassword   = System.getenv("RELEASE_KEY_PASSWORD")   ?: ""
        }
    }

    buildTypes {
        release {
            // Use release signing when the keystore path is provided (CI),
            // fall back to debug signing for local builds.
            signingConfig = System.getenv("RELEASE_STORE_PATH") \
                ? signingConfigs.release \
                : signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }
}

flutter {
    source = "../.."
}
